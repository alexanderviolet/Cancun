<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>🌴 SpringBreak Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="toast"></div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen active">
        <!-- Auth content here (same as before) -->
        <div class="auth-slider" id="auth-slider">
            <!-- Login panel -->
            <div class="auth-panel">
                <!-- ... same login content ... -->
            </div>
            <!-- Signup panel -->
            <div class="auth-panel">
                <!-- ... same signup content ... -->
            </div>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="screen">
        <div class="header">
            <!-- ... same header ... -->
        </div>

        <div class="pages-wrap">
            <!-- HOME PAGE -->
            <div id="page-home" class="page active">
                <!-- ... same home content ... -->
            </div>

            <!-- LOG PAGE -->
            <div id="page-log" class="page">
                <!-- ... same log content ... -->
            </div>

            <!-- LEADERBOARD PAGE -->
            <div id="page-board" class="page">
                <!-- ... same leaderboard content ... -->
            </div>

            <!-- PACKING PAGE (NEW) -->
            <div id="page-packing" class="page">
                <div class="packing-header">
                    <div style="font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:2px">🧳 PACKING CHECKLIST</div>
                    <div style="color:#444;font-size:11px;margin-top:4px;letter-spacing:1px">Don't forget anything!</div>
                </div>
                
                <div class="packing-progress" id="packing-progress">
                    <div class="progress-stats">
                        <span class="progress-packed" id="packed-count">0</span>/<span id="total-items">0</span> packed
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                </div>

                <div class="packing-checklist" id="packing-checklist">
                    <!-- Dynamically populated -->
                </div>

                <div class="packing-summary" id="packing-summary" style="display: none;">
                    <!-- Summary shown when all items checked -->
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn active" id="nav-home" onclick="window.switchPage('home')">
                <span class="nav-icon">🍻</span><span class="nav-label">MY BAR</span>
            </button>
            <button class="nav-btn" id="nav-log" onclick="window.switchPage('log')">
                <span class="nav-icon">➕</span><span class="nav-label">LOG</span>
            </button>
            <button class="nav-btn" id="nav-board" onclick="window.switchPage('board')">
                <span class="nav-icon">🏆</span><span class="nav-label">BOARD</span>
            </button>
            <button class="nav-btn" id="nav-packing" onclick="window.switchPage('packing')">
                <span class="nav-icon">🧳</span><span class="nav-label">PACK</span>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/utils/date-utils.js"></script>
    <script type="module" src="js/utils/roast-utils.js"></script>
    <script type="module" src="js/components/toast.js"></script>
    <script type="module" src="js/components/navigation.js"></script>
    <script type="module" src="js/pages/home.js"></script>
    <script type="module" src="js/pages/log.js"></script>
    <script type="module" src="js/pages/board.js"></script>
    <script type="module" src="js/pages/packing.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
